name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Fetch annotated tags
        run: git fetch --tags --force

      - name: Get tag message
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Extract tag message from annotated tag
          TAG_MSG=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG_NAME")
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release $TAG_NAME"
          fi
          echo "$TAG_MSG" > RELEASE_NOTES.md

      - name: Create release package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PLUGIN_NAME="astrbot_plugin_skland"
          zip -r ${PLUGIN_NAME}-${VERSION}.zip . -x "*.git*" -x "*__pycache__*" -x "*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            astrbot_plugin_skland-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
